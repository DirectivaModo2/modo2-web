<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MODO 2 | FPV CREW</title>
    <style>
        /* Estilos integrados para evitar fallos de carga inicial */
        :root {
            --carbon: #121212;
            --magenta: #ff00ff;
            --white: #f0f0f0;
        }
        body {
            background-color: var(--carbon);
            color: var(--white);
            font-family: 'Courier New', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            border: 15px solid #2a2a2a;
        }
        h1 { color: var(--magenta); text-shadow: 0 0 10px var(--magenta); }
        .btn {
            border: 2px solid var(--magenta);
            color: var(--magenta);
            padding: 15px 30px;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: bold;
            margin-top: 20px;
            display: inline-block;
        }
        .btn:hover { background: var(--magenta); color: var(--carbon); }
        #manifiesto { max-width: 600px; margin-top: 40px; padding: 20px; border-top: 1px solid #333; }
    </style>
</head>
<body>

    <h1>SISTEMA OPERATIVO MODO 2</h1>
    <p>ESTADO: PROTOCOLO DE INCURSIÓN ACTIVADO</p>
    
    <a href="https://tally.so/r/tu-formulario" class="btn">UNIRSE A LA CREW</a>

    <section id="manifiesto">
        <h2>ARTÍCULO 16</h2>
        <p>"No pedimos permiso. Hackeamos el aire. Somos la interferencia."</p>
    </section>

    <footer style="margin-top: 50px; font-size: 0.8rem; opacity: 0.5;">
        &copy; 2026 MODO 2 - TECNOLOGÍA INDUSTRIAL
    </footer>

</body>
</html>
