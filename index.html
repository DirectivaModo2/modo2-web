<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modo2</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .header {
            background-color: #1c1c1e;
            color: cyan;
            padding: 15px;
            width: 100%;
            text-align: center;
            margin-bottom: 20px;
        }
        .nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 10px 0;
        }
        .nav a {
            text-decoration: none;
            color: cyan;
            font-weight: bold;
        }
        .content {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .version {
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Modo2</h1>
        <div class="version">Versión 1.0</div>
    </div>
    <div class="nav">
        <a href="#">Incursiones</a>
        <a href="#">Crew</a>
        <a href="#">Hangar</a>
        <a href="#">Contacto</a>
    </div>
    <div class="content">
        <h2>Bienvenido a Modo2</h2>
        <p>Esta es una plataforma minimalista y moderna.</p>
    </div>
</body>
</html>
