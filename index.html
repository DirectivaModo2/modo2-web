                /* MODO 2 - MAIN.CSS MINIMAL */
:root {
    --cyan: #00f2ff;
    --magenta: #ff0055;
    --black: #020405;
    --white: #e0e6ed;
    --gray: #6b7c85;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    background-color: var(--black);
    color: var(--white);
    font-family: 'Titillium Web', sans-serif;
    min-height: 100vh;
}

.scanlines {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.1) 0px,
        rgba(0, 0, 0, 0.1) 1px,
        transparent 1px,
        transparent 2px
    );
    pointer-events: none;
    z-index: 999;
}

.container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem;
}

header {
    padding: 2rem 0;
    border-bottom: 1px solid rgba(0, 242, 255, 0.2);
}

.logo-container {
    display: flex;
    align-items: center;
    gap: 1rem;
    text-decoration: none;
    color: var(--white);
}

.logo-svg {
    width: 40px;
    height: 46px;
}

.brand-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.5rem;
    font-weight: 900;
}

.brand-white { color: var(--white); }
.brand-cyan { color: var(--cyan); }

.hero {
    text-align: center;
    padding: 4rem 0;
}

.system-command {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1rem;
    margin-bottom: 2rem;
}

.text-cyan { color: var(--cyan); }

.recruitment-counter {
    border: 2px solid var(--magenta);
    padding: 2rem;
    max-width: 400px;
    margin: 2rem auto;
}

.counter-header {
    font-family: 'Share Tech Mono', monospace;
    margin-bottom: 1rem;
}

.counter-main {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1rem;
}

.counter-number {
    font-family: 'Orbitron', sans-serif;
    font-size: 3rem;
    font-weight: 900;
    color: var(--magenta);
}

.counter-label {
    font-family: 'Share Tech Mono', monospace;
}

.status-available {
    font-family: 'Share Tech Mono', monospace;
    color: var(--amber, #ffb800);
}

footer {
    text-align: center;
    padding: 2rem 0;
    margin-top: 3rem;
    border-top: 1px solid rgba(0, 242, 255, 0.1);
}

.copyright {
    font-size: 0.75rem;
    color: var(--gray);
}

.firebase-status {
    position: fixed;
    bottom: 1rem;
    right: 1rem;
    padding: 0.5rem 1rem;
    background: rgba(10, 14, 17, 0.9);
    border: 1px solid var(--gray);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    color: var(--gray);
    z-index: 100;
}

              <script>

// Firebase Config
const firebaseConfig = {
    apiKey: "AIzaSyCkB54CuTQZ9sVj42eSIYjYA9s83WgTJHo",
    authDomain: "modo2-mainframe-b9f2e.firebaseapp.com",
    projectId: "modo2-mainframe-b9f2e",
    storageBucket: "modo2-mainframe-b9f2e.firebasestorage.app",
    messagingSenderId: "253905847546",
    appId: "1:253905847546:web:718d87ae9f723ae39c3543"
};

// Initialize Firebase
let app, auth, db;
let firebaseInitialized = false;

try {
    app = firebase.initializeApp(firebaseConfig);
    auth = firebase.auth();
    db = firebase.firestore();
    firebaseInitialized = true;
    updateFirebaseStatus('connected', 'MAINFRAME: CONECTADO');
    console.log('✅ FIREBASE INITIALIZED');
} catch (error) {
    console.error('❌ FIREBASE ERROR:', error);
    updateFirebaseStatus('error', 'MAINFRAME: ERROR');
}

function updateFirebaseStatus(status, text) {
    const el = document.getElementById('firebaseStatus');
    if (el) {
        el.textContent = text;
        el.className = 'firebase-status ' + status;
    }
}

// XP System
let xp = parseInt(localStorage.getItem('modo2_xp')) || 0;
let visitCount = parseInt(localStorage.getItem('modo2_visits')) || 0;

visitCount++;
localStorage.setItem('modo2_visits', visitCount);

if (xp < 1000) {
    xp = Math.min(xp + 1, 1000);
    localStorage.setItem('modo2_xp', xp);
}

console.log('✅ MODO 2 LOADED - Visits:', visitCount, 'XP:', xp);
